openapi: 3.0.3
info:
  title: Orders API
  description: >
    Management of orders placed by subscribers.
    This component consumes the Menus API to validate the ordered menus
    and calculate their price at the time of the order.
    Consumed by the UI.
  version: 1.0.0

servers:
  - url: http://localhost:8082/orders/api
    description: Local development server

tags:
  - name: Orders
    description: CRUD operations on orders

paths:

  /orders:
    get:
      tags: [Orders]
      summary: List all orders
      operationId: getAllOrders
      parameters:
        - name: subscriberId
          in: query
          required: false
          description: Filter orders for a specific subscriber
          schema:
            type: integer
      responses:
        '200':
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'

    post:
      tags: [Orders]
      summary: Validate a new order
      operationId: createOrder
      description: >
        Registers an order. The component calls the Menus API to verify
        the existence of menus and retrieve their price at the time of the order.
        The order date is recorded automatically on the server side.
        Payment will be made upon delivery.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderInput'
            example:
              subscriberId: 3
              deliveryAddress: "7 avenue du Prado, 13008 Marseille"
              deliveryDate: "2025-04-01"
              items:
                - menuId: 1
                  quantity: 2
                - menuId: 3
                  quantity: 1
      responses:
        '201':
          description: Order created
          headers:
            Location:
              schema:
                type: string
                example: /orders/1
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          description: Invalid data (past delivery date, zero quantity...)
        '404':
          description: Subscriber or menu not found

  /orders/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'

    get:
      tags: [Orders]
      summary: Get an order by its ID
      operationId: getOrderById
      responses:
        '200':
          description: Order found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '404':
          description: Order not found

    put:
      tags: [Orders]
      summary: Modify an order (delivery address or date)
      operationId: updateOrder
      description: >
        Allows modification of the address or delivery date.
        Modifying order items is not supported:
        the order must be deleted and recreated.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderUpdateInput'
            example:
              deliveryAddress: "3 rue Paradis, 13001 Marseille"
              deliveryDate: "2025-04-03"
      responses:
        '200':
          description: Order updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '404':
          description: Order not found

    delete:
      tags: [Orders]
      summary: Cancel an order
      operationId: deleteOrder
      responses:
        '204':
          description: Order cancelled
        '404':
          description: Order not found

components:

  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1

  schemas:

    OrderItem:
      type: object
      properties:
        menuId:
          type: integer
          description: Menu ID (FK to Menus API)
          example: 1
        menuName:
          type: string
          readOnly: true
          description: Menu name at the time of the order (snapshot)
          example: "Menu Provence"
        quantity:
          type: integer
          minimum: 1
          example: 2
        unitPrice:
          type: number
          format: double
          readOnly: true
          description: Menu price at the time of the order (snapshot)
          example: 17.50
        linePrice:
          type: number
          format: double
          readOnly: true
          description: unitPrice × quantity
          example: 35.00

    OrderItemInput:
      type: object
      required: [menuId, quantity]
      properties:
        menuId:
          type: integer
          example: 1
        quantity:
          type: integer
          minimum: 1
          example: 2

    Order:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          example: 1
        subscriberId:
          type: integer
          description: Subscriber ID (FK to Dishes and Users API)
          example: 3
        orderDate:
          type: string
          format: date-time
          readOnly: true
          description: Validation timestamp, calculated on the server side
          example: "2025-03-20T14:32:00"
        deliveryAddress:
          type: string
          example: "7 avenue du Prado, 13008 Marseille"
        deliveryDate:
          type: string
          format: date
          example: "2025-04-01"
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        totalPrice:
          type: number
          format: double
          readOnly: true
          description: Sum of linePrices, calculated on the server side
          example: 52.50

    OrderInput:
      type: object
      required: [subscriberId, deliveryAddress, deliveryDate, items]
      properties:
        subscriberId:
          type: integer
          example: 3
        deliveryAddress:
          type: string
          example: "7 avenue du Prado, 13008 Marseille"
        deliveryDate:
          type: string
          format: date
          example: "2025-04-01"
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/OrderItemInput'

    OrderUpdateInput:
      type: object
      required: [deliveryAddress, deliveryDate]
      properties:
        deliveryAddress:
          type: string
          example: "3 rue Paradis, 13001 Marseille"
        deliveryDate:
          type: string
          format: date
          example: "2025-04-03"
